<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="This website lets you crop images into a square while previewing how your icon will look as a social media profile picture."
    />

    <title>Free Square Image Cropper for Profile Pictures & Icons</title>
    <link rel="icon" href="cropicon.png" type="image/x-icon" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter&display=swap");
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", "Noto Sans JP", sans-serif;
        background-color: black;
        color: white;
        padding: 2rem;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      main {
        width: 52rem;
      }
      .header-row {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 2.5rem;
        gap: 0.75rem;
      }
      #links {
        display: flex;
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.4);
        gap: 0.5rem;
      }
      #links a {
        text-decoration: none;
        color: rgba(255, 255, 255, 0.7);
        transition:
          color 0.2s,
          border 0.2s;
        background-color: rgba(255, 255, 255, 0.1);
        padding: 0.25rem 0.5rem;
        border-radius: 0.25rem;
        border: solid 1px rgba(255, 255, 255, 0);
      }
      #links a:hover {
        color: rgba(255, 255, 255, 0.6);
        border: solid 1px rgba(255, 255, 255, 0.25);
      }
      h1 {
        width: auto;
        font-size: 1.3rem;
        line-height: 1.5;
      }
      h1 a {
        color: white;
        opacity: 0.5;
        transition: opacity 0.2s;
      }
      h1 a:hover {
        opacity: 0.25;
      }
      .mobile-break {
        display: none;
      }
      #page-title {
        transition: opacity 0.2s;
        cursor: pointer;
      }
      #page-title:hover {
        opacity: 0.75;
      }
      .byline {
        flex-shrink: 0;
      }
      .byline a {
        height: 1.5rem;
        color: white;
        text-decoration: none;
        display: inline-flex;
        border-radius: 0.25rem;
        margin-left: 0.25rem;
        padding: 0 0.5em;
        background-color: rgba(255, 255, 255, 0.1);
        border: solid 1px rgba(255, 255, 255, 0);
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .byline a svg {
        margin-left: 0.25rem;
      }
      .byline a:hover {
        border: solid 1px rgba(255, 255, 255, 0.25);
      }
      .container {
        display: flex;
        flex-wrap: wrap;
      }
      .cropper-area {
        position: relative;
        width: 500px;
        height: 500px;
        border: 1px dashed rgba(255, 255, 255, 0.25);
        border-radius: 0;
        overflow: hidden;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: border 0.2s;
      }
      .cropper-area:not(.has-image):hover {
        border: 1px dashed rgba(255, 255, 255, 0.75);
      }
      .cropper-area.has-image {
        cursor: move;
      }
      #placeholder {
        position: absolute;
        width: 500px;
        height: 500px;
        pointer-events: none;
        background:
          linear-gradient(
            to top right,
            transparent calc(50% - 0.5px),
            rgba(255, 255, 255, 0.25) 50%,
            transparent calc(50% + 0.5px)
          ),
          linear-gradient(
            to bottom right,
            transparent calc(50% - 0.5px),
            rgba(255, 255, 255, 0.25) 50%,
            transparent calc(50% + 0.5px)
          );
        background-size: 100% 100%;
        background-repeat: no-repeat;
      }
      .side {
        border-left: 1px solid rgba(255, 255, 255, 0.25);
        padding-left: 1.25rem;
        margin-left: 1.25rem;
        flex: 1;
        width: auto;
        min-width: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        opacity: 1;
        opacity: 0.1;
        pointer-events: none;
      }
      #upload-prompt {
        text-align: center;
      }
      #preview-image {
        position: absolute;
        display: none;
        user-select: none;
        -webkit-user-drag: none;
        transition: opacity 0.2s;
      }
      .info,
      .icon-preview,
      .controls {
        width: 100%;
      }
      #file-name {
        font-size: 1rem;
        width: 100%;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: normal;
        word-break: break-all;
        margin-bottom: 0.75rem;
      }
      #description {
        font-size: 0.7rem;
        color: rgba(255, 255, 255, 0.7);
        line-height: 1rem;
      }
      #description p {
        border-bottom: solid 1px rgba(255, 255, 255, 0.1);
        display: flex;
        justify-content: space-between;
      }

      .social-icons {
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.5rem;
      }

      .discord {
        width: 4.25rem;
        height: 4.25rem;
        border-radius: 50%;
        background-color: rgba(255, 255, 255, 0.1);
        position: relative;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .online {
        position: absolute;
        right: 0;
        bottom: 0;
        width: calc(4.25rem / (10 / 3));
        height: calc(4.25rem / (10 / 3));
        border-radius: 50%;
        background-color: rgb(67, 162, 90);
        box-shadow: 0 0 0 0.4rem black;
      }
      .frame {
        position: absolute;
        width: 120%;
        height: 120%;
        top: -10%;
        left: -10%;
        background: none;
        background-size: contain;
      }
      .discord-server {
        width: 4.25rem;
        height: 4.25rem;
        background-color: black;
        position: relative;
        overflow: hidden;
        cursor: pointer;
        transition: opacity 0.2s;

        mask: url(#blobMask);
        -webkit-mask: url(#blobMask); /* Chrome/Safari */
        mask-size: 100% 100%;
        -webkit-mask-size: 100% 100%;
        mask-repeat: no-repeat;
        -webkit-mask-repeat: no-repeat;
      }
      .insta-ring {
        margin-top: -0.375rem;
        width: 5rem;
        height: 5rem;
        padding: 0.2rem;
        background: conic-gradient(#d300c5, #ffca00, #d300c5);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transform: rotate(45deg);
      }

      .insta-ring > .inner {
        width: 100%;
        height: 100%;
        background-color: black;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .insta {
        width: 4.25rem;
        height: 4.25rem;
        border-radius: 50%;
        background-color: rgba(255, 255, 255, 0.1);
        position: relative;
        overflow: hidden;
        transform: rotate(-45deg);
        transition: opacity 0.2s;
        cursor: pointer;
      }
      .preview-surface {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        border-radius: inherit;
        pointer-events: none;
        z-index: 0;
      }
      .online,
      .frame {
        z-index: 1;
      }
      .discord-message {
        display: flex;
        font-size: 0.85rem;
      }
      .discord2 {
        width: 2.8rem;
        height: 2.8rem;
        border-radius: 50%;
        background-color: rgba(255, 255, 255, 0.1);
        position: relative;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .discord:hover,
      .discord2:hover,
      .discord-server:hover,
      .insta:hover {
        opacity: 0.75;
      }
      .message {
        padding: 0 0 0 1rem;
        line-height: 1.4rem;
      }
      .discord-name {
        font-weight: bold;
      }
      .discord-time {
        opacity: 0.5;
        font-size: 0.7rem;
        margin-left: 0.5rem;
      }

      .input {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        width: 100%;
        height: 1.5rem;
        margin-bottom: 0.5rem;
        font-size: 0.85rem;
      }
      .url-input {
        flex: 1;
        min-width: 0;
        height: 100%;
        background-color: rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.7);
        border: none;
        border-radius: 0.25rem;
        padding: 0.3rem 0.4rem;
        transition: background-color 0.2s;
      }
      .url-input:focus,
      .url-input:hover {
        background-color: rgba(255, 255, 255, 0.25);
      }
      .url-input::placeholder {
        color: rgba(255, 255, 255, 0.1);
      }

      .divider {
        width: 1px;
        height: 100%;
        background-color: rgba(255, 255, 255, 0.25);
      }

      .flip-buttons {
        display: flex;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 0.25rem;
        overflow: hidden;
      }
      .icon-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        padding: 0.2rem;
        background: transparent;
        border: none;
        color: white;
        cursor: pointer;
        transition: background 0.2s;
        outline: none;
      }
      .icon-btn:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      .icon-btn.is-active {
        background: rgba(255, 255, 255, 0.25);
      }

      .control {
        margin-bottom: 0.5rem;
        width: 100%;
        font-size: 0.85rem;
        -webkit-user-select: none; /* Safari */
        -ms-user-select: none; /* IE 10 and IE 11 */
        user-select: none; /* Standard syntax */
      }
      label {
        display: flex;
        justify-content: space-between;
      }
      .zoom-percent,
      .prev-percent,
      .rotate-degree {
        opacity: 0.25;
      }
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        background: linear-gradient(
          to right,
          rgba(255, 255, 255, 0.25) 0%,
          rgba(255, 255, 255, 0.25) 0%,
          rgba(255, 255, 255, 0.1) 0%,
          rgba(255, 255, 255, 0.1) 100%
        );
        height: 0.5rem;
        outline: none;
        border-radius: 0.25rem;
        margin-bottom: 0.5rem;
        cursor: pointer;
      }

      /* WebKit (Chrome, Safari) */
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 1rem;
        height: 0.5rem;
        border-top-left-radius: 25% 50%;
        border-top-right-radius: 25% 50%;
        border-bottom-right-radius: 25% 50%;
        border-bottom-left-radius: 25% 50%;
        background: white;
      }

      /* Firefox */
      input[type="range"]::-moz-range-thumb {
        width: 1rem;
        height: 0.5rem;
        border-radius: 25% / 50%;
        background: white;
        border: none;
      }
      @supports (-moz-appearance: none) {
        input[type="range"] {
          margin-top: 0.3rem;
          margin-bottom: 0.75rem;
        }
        #download-btn {
          width: 72% !important;
        }
        #new-file-btn {
          width: 25% !important;
        }
      }

      .buttons {
        width: 100%;
        display: flex;
        justify-content: space-between;
      }
      #download-btn {
        background-color: white;
        width: 70%;
        height: 2rem;
        color: black;
        border: none;
        padding-left: 0.8rem;
        justify-content: center;
        font-size: 0.9rem;
        border-radius: 0.25rem;
        cursor: pointer;
        transition: opacity 0.3s;
        text-align: left;
      }
      #new-file-btn {
        color: white;
        width: 27%;
        height: 2rem;
        background-color: black;
        border: 1px solid rgba(255, 255, 255, 0.5);
        /* padding-left: 0.8rem; */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 0.9rem;
        border-radius: 0.25rem;
        cursor: pointer;
        transition: opacity 0.2s;
        text-align: left;
      }
      .buttons button:hover {
        opacity: 0.5;
      }
      #file-input {
        display: none;
      }

      @media (max-width: 900px) {
        .header-row {
          margin-bottom: 2rem;
        }
        h1 {
          font-size: 0.75rem;
        }
        #page-title {
          font-size: 1.2rem;
        }
        .mobile-break {
          display: inline;
        }
        main {
          max-width: 300px;
          width: 100%;
          margin-bottom: 3rem;
        }
        .container {
          flex-direction: column;
          align-items: center;
        }

        .side {
          max-width: 100% !important;
          height: 500px;
          margin-left: 0;
          padding-left: 0;
          border-left: none;
        }

        .cropper-area,
        #placeholder {
          max-width: 300px;
          width: 100%;
          height: auto;
          aspect-ratio: 1 / 1;
          margin-bottom: 1rem;
        }
        .icon-preview {
          margin: 2rem 0;
        }
        .discord2 {
          width: 2.8rem;
          height: 2.8rem;
          aspect-ratio: 1 / 1;
        }
        #new-file-btn {
          min-width: 27%;
        }
        .byline {
          margin-bottom: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="header-row">
        <h1 id="page-title" onclick="location.reload()">Square Image Cropper for PFP</h1>
        <p id="links">
          <a href="https://linktr.ee/sheetau" target="_blank" rel="noopener noreferrer">Sheeta</a
          ><a href="https://github.com/sheetau/pfpcropper" target="_blank" rel="noopener noreferrer">GitHub</a>
        </p>
        <!-- <p class="byline">
          by
          <a href="https://linktr.ee/sheetau" target="_blank" rel="noopener noreferrer">
            sheeta
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M8.14645 3.14645C8.34171 2.95118 8.65829 2.95118 8.85355 3.14645L12.8536 7.14645C13.0488 7.34171 13.0488 7.65829 12.8536 7.85355L8.85355 11.8536C8.65829 12.0488 8.34171 12.0488 8.14645 11.8536C7.95118 11.6583 7.95118 11.3417 8.14645 11.1464L11.2929 8H2.5C2.22386 8 2 7.77614 2 7.5C2 7.22386 2.22386 7 2.5 7H11.2929L8.14645 3.85355C7.95118 3.65829 7.95118 3.34171 8.14645 3.14645Z"
                fill="currentColor"
                fill-rule="evenodd"
                clip-rule="evenodd"
              ></path>
            </svg>
          </a>
        </p> -->
      </div>

      <div class="container">
        <div id="placeholder"></div>
        <div id="cropper" class="cropper-area">
          <p id="upload-prompt">Drop or click to upload image</p>
          <img id="preview-image" alt="Preview" />
        </div>

        <div class="side">
          <div class="info">
            <p id="file-name">...</p>
            <div id="description">
              <p><span>Dimensions</span><span id="dimensions"></span></p>
              <p><span>Size</span><span id="size"></span></p>
              <p><span>Crop dimensions</span><span id="c-dimensions"></span></p>
              <p><span>Crop position</span><span id="c-position"></span></p>
              <p><span>Crop size</span><span id="c-size"></span></p>
            </div>
          </div>

          <div class="icon-preview">
            <div class="social-icons">
              <div class="discord">
                <div class="online"></div>
                <div class="frame"></div>
              </div>
              <div class="discord-server"></div>
              <div class="insta-ring">
                <div class="inner"><div class="insta"></div></div>
              </div>
            </div>
            <div class="discord-message">
              <div class="discord2"><div class="frame"></div></div>
              <div class="message">
                <span class="discord-name">Phibi</span><span class="discord-time">Today at 05:15 PM</span>
                <p>Waiting for the day when</p>
                <p>Compact mode would be turned on</p>
              </div>
            </div>
          </div>

          <div class="controls">
            <div class="input">
              <span>Frame</span>
              <input
                type="url"
                class="url-input"
                id="frameUrl"
                placeholder="cdn.discordapp.com/avatar-decoration-presets/....png"
                title="https://cdn.discordapp.com/avatar-decoration-presets/....png"
              />
              <div class="divider"></div>
              <div class="flip-buttons">
                <button id="flip-h-btn" class="icon-btn" title="Flip Horizontal">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="20"
                    height="20"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="icon-tabler-flip-vertical"
                  >
                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                    <path d="M12 3l0 18" />
                    <path d="M16 7l0 10l5 0l-5 -10" />
                    <path d="M8 7l0 10l-5 0l5 -10" />
                  </svg>
                </button>
                <button id="flip-v-btn" class="icon-btn" title="Flip Vertical">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="20"
                    height="20"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="icon-tabler-flip-horizontal"
                  >
                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                    <path d="M3 12l18 0" />
                    <path d="M7 16l10 0l-10 5l0 -5" />
                    <path d="M7 8l10 0l-10 -5l0 5" />
                  </svg>
                </button>
              </div>
            </div>
            <div class="control">
              <label for="zoom-range"><span>Zoom</span><span class="zoom-percent"></span></label>
              <input type="range" id="zoom-range" min="100" max="1000" value="100" disabled />
              <label for="rotation-range"><span>Rotation</span><span class="rotate-degree"></span></label>
              <input type="range" id="rotation-range" min="-180" max="180" value="0" disabled />
              <label for="prev-radius"><span>Preview radius</span><span class="prev-percent"></span></label>
              <input type="range" id="prev-radius" min="0" max="50" value="50" disabled />
            </div>

            <div class="buttons">
              <button id="download-btn" disabled>Download</button>
              <button id="new-file-btn">New file</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <input type="file" id="file-input" accept="image/*" />

    <svg width="0" height="0">
      <defs>
        <mask id="blobMask" maskContentUnits="objectBoundingBox">
          <path
            d="M0 0.436 C0 0.284 0 0.207 0.03 0.149 C0.056 0.098 0.098 0.056 0.149 0.03 C0.207 0 0.284 0 0.436 0 H0.564 C0.716 0 0.793 0 0.851 0.03 C0.902 0.056 0.944 0.098 0.97 0.149 C1 0.207 1 0.284 1 0.436 V0.564 C1 0.716 1 0.793 0.97 0.851 C0.944 0.902 0.902 0.944 0.851 0.97 C0.793 1 0.716 1 0.564 1 H0.436 C0.284 1 0.207 1 0.149 0.97 C0.098 0.944 0.056 0.902 0.03 0.851 C0 0.793 0 0.716 0 0.564 V0.436 Z"
            fill="white"
          />
        </mask>
      </defs>
    </svg>

    <script>
      const cropperArea = document.getElementById("cropper");
      const previewImage = document.getElementById("preview-image");
      const uploadPrompt = document.getElementById("upload-prompt");
      const fileInput = document.getElementById("file-input");
      const fileName = document.getElementById("file-name");
      const zoomRange = document.getElementById("zoom-range");
      const rotationRange = document.getElementById("rotation-range");
      const prevRange = document.getElementById("prev-radius");
      const flipHBtn = document.getElementById("flip-h-btn");
      const flipVBtn = document.getElementById("flip-v-btn");
      const downloadBtn = document.getElementById("download-btn");
      const newFileBtn = document.getElementById("new-file-btn");
      const sideEl = document.querySelector(".side");
      const zoomPer = document.querySelector(".zoom-percent");
      const rotateDeg = document.querySelector(".rotate-degree");
      const prevPer = document.querySelector(".prev-percent");
      const dimentsions = document.getElementById("dimensions");
      const size = document.getElementById("size");
      const cDimentsions = document.getElementById("c-dimensions");
      const cPosition = document.getElementById("c-position");
      const cSize = document.getElementById("c-size");

      const discord = document.querySelector(".discord");
      const discord2 = document.querySelector(".discord2");
      const discordServer = document.querySelector(".discord-server");
      const insta = document.querySelector(".insta");
      const previewTargets = [discord, discord2, discordServer, insta];
      const previewSurfaceState = new Map();
      const EVEN_ROTATION_STEP = 2;
      const ROTATION_SNAP_INTERVAL = 45;
      const ROTATION_SNAP_THRESHOLD = 5;
      const CROP_SIZE_DEBOUNCE_MS = 120;

      let savedRadius = localStorage.getItem("cropperRadius") || "50";
      prevRange.value = savedRadius;
      prevPer.textContent = `${savedRadius}%`;
      zoomPer.textContent = `${zoomRange.value}%`;
      rotateDeg.textContent = `${rotationRange.value}deg`;

      let imageName = "";
      let isDragging = false;
      let startX = 0;
      let startY = 0;
      let startLocalOffsetX = 0;
      let startLocalOffsetY = 0;
      let currentImage = null;
      let lastTouchDistance = null;
      let cropSizeUpdateTimeout = null;
      let imageState = {
        zoom: 1,
        rotation: 0,
        width: 0,
        height: 0,
        localOffsetX: 0,
        localOffsetY: 0,
        flipX: 1,
        flipY: 1,
      };

      const input = document.getElementById("frameUrl");
      const frames = document.querySelectorAll(".frame");
      const savedUrl = localStorage.getItem("frameUrl") || "";
      input.value = savedUrl;
      if (savedUrl) {
        frames.forEach((frame) => {
          frame.style.backgroundImage = `url("${savedUrl}")`;
        });
      }

      input.addEventListener("input", () => {
        const url = input.value.trim().split("?")[0];
        localStorage.setItem("frameUrl", url);
        frames.forEach((frame) => {
          frame.style.backgroundImage = url ? `url("${url}")` : "none";
        });
      });

      function updateRangeBackground(range) {
        const value = ((range.value - range.min) / (range.max - range.min)) * 100;
        range.style.background =
          "linear-gradient(to right, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0.25) " +
          value +
          "%, rgba(255, 255, 255, 0.1) " +
          value +
          "%, rgba(255, 255, 255, 0.1) 100%)";
      }

      function getCropperMetrics() {
        return {
          width: cropperArea.offsetWidth,
          height: cropperArea.offsetHeight,
          centerX: cropperArea.offsetWidth / 2,
          centerY: cropperArea.offsetHeight / 2,
          previewRadius: Math.min(cropperArea.offsetWidth, cropperArea.offsetHeight) / 2,
        };
      }

      function getBaseImageSize(img) {
        const containerRatio = cropperArea.offsetWidth / cropperArea.offsetHeight;
        const imageRatio = img.width / img.height;

        if (imageRatio > containerRatio) {
          const height = cropperArea.offsetHeight;
          return { width: height * imageRatio, height };
        }

        const width = cropperArea.offsetWidth;
        return { width, height: width / imageRatio };
      }

      function getRotationRadians() {
        return (getVisualRotation() * Math.PI) / 180;
      }

      function getVisualRotation() {
        return imageState.rotation * imageState.flipX * imageState.flipY;
      }

      function rotateVector(x, y, radians) {
        const cos = Math.cos(radians);
        const sin = Math.sin(radians);
        return {
          x: x * cos - y * sin,
          y: x * sin + y * cos,
        };
      }

      function screenVectorToLocal(dx, dy) {
        const rotated = rotateVector(dx, dy, -getRotationRadians());
        return {
          x: rotated.x * imageState.flipX,
          y: rotated.y * imageState.flipY,
        };
      }

      function refreshImageSize() {
        if (!currentImage) return;
        const base = getBaseImageSize(currentImage);
        imageState.width = base.width * imageState.zoom;
        imageState.height = base.height * imageState.zoom;
      }

      function setZoomValue(value) {
        zoomRange.value = value;
        imageState.zoom = value / 100;
        zoomPer.textContent = `${value}%`;
        updateRangeBackground(zoomRange);
      }

      function setRotationValue(value) {
        rotationRange.value = value;
        imageState.rotation = value;
        rotateDeg.textContent = `${value}deg`;
        updateRangeBackground(rotationRange);
      }

      function normalizeRotation(value) {
        return Math.max(-180, Math.min(180, value));
      }

      function snapRotationForSlider(value) {
        const snappedValue = Math.round(value / ROTATION_SNAP_INTERVAL) * ROTATION_SNAP_INTERVAL;
        return Math.abs(snappedValue - value) <= ROTATION_SNAP_THRESHOLD ? snappedValue : value;
      }

      function getNextWheelRotation(currentValue, direction) {
        const normalized = normalizeRotation(currentValue);
        if (normalized % EVEN_ROTATION_STEP !== 0) {
          return normalizeRotation(normalized + direction);
        }
        return normalizeRotation(normalized + direction * EVEN_ROTATION_STEP);
      }

      function getImagePixelScale() {
        if (!currentImage || !imageState.width) return 1;
        return currentImage.width / imageState.width;
      }

      function getOutputResolution() {
        return Math.max(1, Math.round(cropperArea.offsetWidth * getImagePixelScale()));
      }

      function clampImageState() {
        const { previewRadius } = getCropperMetrics();
        const maxOffsetX = Math.max(0, imageState.width / 2 - previewRadius);
        const maxOffsetY = Math.max(0, imageState.height / 2 - previewRadius);

        imageState.localOffsetX = Math.max(-maxOffsetX, Math.min(maxOffsetX, imageState.localOffsetX));
        imageState.localOffsetY = Math.max(-maxOffsetY, Math.min(maxOffsetY, imageState.localOffsetY));
      }

      function renderPreviewImage() {
        const { centerX, centerY } = getCropperMetrics();
        const flippedOffset = {
          x: imageState.localOffsetX * imageState.flipX,
          y: imageState.localOffsetY * imageState.flipY,
        };
        const rotatedOffset = rotateVector(flippedOffset.x, flippedOffset.y, getRotationRadians());
        const imageCenterX = centerX - rotatedOffset.x;
        const imageCenterY = centerY - rotatedOffset.y;

        previewImage.style.width = `${imageState.width}px`;
        previewImage.style.height = `${imageState.height}px`;
        previewImage.style.left = `${imageCenterX}px`;
        previewImage.style.top = `${imageCenterY}px`;
        previewImage.style.transform = `translate(-50%, -50%) rotate(${getVisualRotation()}deg) scale(${imageState.flipX}, ${imageState.flipY})`;
        previewImage.style.transformOrigin = "center center";
      }

      function renderCurrentViewToCanvas(ctx, width, height) {
        if (!currentImage) return;

        const scale = width / cropperArea.offsetWidth;
        ctx.clearRect(0, 0, width, height);
        ctx.save();
        ctx.translate(width / 2, height / 2);
        ctx.scale(scale, scale);
        ctx.rotate(getRotationRadians());
        ctx.scale(imageState.flipX, imageState.flipY);
        ctx.drawImage(
          currentImage,
          -imageState.localOffsetX - imageState.width / 2,
          -imageState.localOffsetY - imageState.height / 2,
          imageState.width,
          imageState.height,
        );
        ctx.restore();
      }

      function getCropPositionInSource() {
        if (!currentImage) return null;

        const scale = getImagePixelScale();
        return {
          x: Math.max(0, Math.min(currentImage.width, currentImage.width / 2 + imageState.localOffsetX * scale)),
          y: Math.max(0, Math.min(currentImage.height, currentImage.height / 2 + imageState.localOffsetY * scale)),
        };
      }

      function updateCropInfo() {
        if (!currentImage) return;

        const outputResolution = getOutputResolution();
        cDimentsions.textContent = `${outputResolution} x ${outputResolution}`;

        const position = getCropPositionInSource();
        if (position) {
          cPosition.textContent = `${Math.round(position.x)}, ${Math.round(position.y)}`;
        }

        scheduleCropSizeUpdate(outputResolution);
      }

      function scheduleCropSizeUpdate(outputResolution) {
        if (cropSizeUpdateTimeout !== null) {
          clearTimeout(cropSizeUpdateTimeout);
        }

        cropSizeUpdateTimeout = setTimeout(() => {
          cropSizeUpdateTimeout = null;

          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          canvas.width = outputResolution;
          canvas.height = outputResolution;
          renderCurrentViewToCanvas(ctx, canvas.width, canvas.height);

          canvas.toBlob(
            (blob) => {
              if (!blob) {
                cSize.textContent = "N/A";
                return;
              }
              requestAnimationFrame(() => {
                cSize.textContent =
                  blob.size >= 1024 * 1024
                    ? `${(blob.size / (1024 * 1024)).toFixed(2)} MB`
                    : `${(blob.size / 1024).toFixed(2)} KB`;
              });
            },
            currentImage.src.startsWith("data:image/png") ? "image/png" : "image/jpeg",
          );
        }, CROP_SIZE_DEBOUNCE_MS);
      }

      function applyImageState() {
        clampImageState();
        renderPreviewImage();
        updateCropInfo();
      }

      function updateZoom(anchorX, anchorY) {
        if (!currentImage) return;

        const metrics = getCropperMetrics();
        const focusX = anchorX ?? metrics.centerX;
        const focusY = anchorY ?? metrics.centerY;
        const localPointer = screenVectorToLocal(focusX - metrics.centerX, focusY - metrics.centerY);

        const prevWidth = imageState.width;
        const prevHeight = imageState.height;
        const normalizedX = prevWidth ? (imageState.localOffsetX + localPointer.x) / prevWidth : 0;
        const normalizedY = prevHeight ? (imageState.localOffsetY + localPointer.y) / prevHeight : 0;

        imageState.zoom = parseInt(zoomRange.value, 10) / 100;
        refreshImageSize();

        imageState.localOffsetX = normalizedX * imageState.width - localPointer.x;
        imageState.localOffsetY = normalizedY * imageState.height - localPointer.y;

        applyImageState();
      }

      function updateRotation(value, options = {}) {
        if (!currentImage) return;
        const nextValue = options.fromSlider ? snapRotationForSlider(value) : value;
        setRotationValue(normalizeRotation(nextValue));
        applyImageState();
        syncPreviews();
      }

      function updateFlipButtonState(button, isActive) {
        button.classList.toggle("is-active", isActive);
        button.setAttribute("aria-pressed", isActive ? "true" : "false");
      }

      function syncFlipButtons() {
        updateFlipButtonState(flipHBtn, imageState.flipX === -1);
        updateFlipButtonState(flipVBtn, imageState.flipY === -1);
      }

      function toggleFlip(axis) {
        if (axis === "x") {
          imageState.flipX *= -1;
        } else {
          imageState.flipY *= -1;
        }

        syncFlipButtons();
        if (!currentImage) return;
        applyImageState();
        syncPreviews();
      }

      function beginDrag(clientX, clientY) {
        isDragging = true;
        startX = clientX;
        startY = clientY;
        startLocalOffsetX = imageState.localOffsetX;
        startLocalOffsetY = imageState.localOffsetY;
      }

      function continueDrag(clientX, clientY) {
        if (!isDragging) return;
        const deltaX = clientX - startX;
        const deltaY = clientY - startY;
        const localDelta = screenVectorToLocal(deltaX, deltaY);

        imageState.localOffsetX = startLocalOffsetX - localDelta.x;
        imageState.localOffsetY = startLocalOffsetY - localDelta.y;
        applyImageState();
        syncPreviews();
      }

      function getPreviewSurface(target) {
        let surfaceState = previewSurfaceState.get(target);
        if (surfaceState) {
          return surfaceState;
        }

        const canvas = document.createElement("canvas");
        canvas.className = "preview-surface";
        target.prepend(canvas);
        surfaceState = {
          canvas,
          ctx: canvas.getContext("2d"),
          width: 0,
          height: 0,
        };
        previewSurfaceState.set(target, surfaceState);
        return surfaceState;
      }

      function resizePreviewSurface(surfaceState, target) {
        const targetWidth = Math.max(1, Math.round(target.clientWidth * window.devicePixelRatio));
        const targetHeight = Math.max(1, Math.round(target.clientHeight * window.devicePixelRatio));

        if (surfaceState.width === targetWidth && surfaceState.height === targetHeight) {
          return;
        }

        surfaceState.width = targetWidth;
        surfaceState.height = targetHeight;
        surfaceState.canvas.width = targetWidth;
        surfaceState.canvas.height = targetHeight;
      }

      updateRangeBackground(zoomRange);
      updateRangeBackground(rotationRange);
      updateRangeBackground(prevRange);
      syncFlipButtons();

      cropperArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        e.stopPropagation();
        cropperArea.style.border = "1px dashed rgba(255, 255, 255, 1)";
        previewImage.style.opacity = "0.5";
      });

      cropperArea.addEventListener("dragleave", (e) => {
        e.preventDefault();
        e.stopPropagation();
        cropperArea.style.border = cropperArea.classList.contains("has-image")
          ? "1px dashed rgba(255, 255, 255, 0)"
          : "1px dashed rgba(255, 255, 255, 0.25)";
        previewImage.style.opacity = "";
      });

      cropperArea.addEventListener("drop", (e) => {
        e.preventDefault();
        e.stopPropagation();
        cropperArea.style.border = cropperArea.classList.contains("has-image")
          ? "1px dashed rgba(255, 255, 255, 0)"
          : "1px dashed rgba(255, 255, 255, 0.25)";
        previewImage.style.opacity = "";

        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
          handleFile(e.dataTransfer.files[0]);
        }
      });

      cropperArea.addEventListener("click", () => {
        if (!cropperArea.classList.contains("has-image")) {
          fileInput.click();
        }
      });

      fileInput.addEventListener("change", () => {
        if (fileInput.files && fileInput.files[0]) {
          handleFile(fileInput.files[0]);
        }
      });

      cropperArea.addEventListener("mousedown", (e) => {
        if (!cropperArea.classList.contains("has-image")) return;
        beginDrag(e.clientX, e.clientY);
        e.preventDefault();
      });

      document.addEventListener("mousemove", (e) => {
        continueDrag(e.clientX, e.clientY);
      });

      document.addEventListener("mouseup", () => {
        isDragging = false;
      });

      cropperArea.addEventListener(
        "touchstart",
        (e) => {
          if (!cropperArea.contains(e.target) || !cropperArea.classList.contains("has-image")) return;

          if (e.touches.length === 1) {
            beginDrag(e.touches[0].clientX, e.touches[0].clientY);
          } else if (e.touches.length === 2) {
            lastTouchDistance = Math.hypot(
              e.touches[0].clientX - e.touches[1].clientX,
              e.touches[0].clientY - e.touches[1].clientY,
            );
          }

          e.preventDefault();
        },
        { passive: false },
      );

      document.addEventListener(
        "touchmove",
        (e) => {
          if (!cropperArea.contains(e.target) || !cropperArea.classList.contains("has-image")) return;

          if (e.touches.length === 1 && isDragging) {
            continueDrag(e.touches[0].clientX, e.touches[0].clientY);
          } else if (e.touches.length === 2) {
            const currentDistance = Math.hypot(
              e.touches[0].clientX - e.touches[1].clientX,
              e.touches[0].clientY - e.touches[1].clientY,
            );

            if (lastTouchDistance !== null) {
              const delta = currentDistance - lastTouchDistance;
              if (Math.abs(delta) > 2) {
                const rect = cropperArea.getBoundingClientRect();
                const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
                const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
                const newZoom = Math.max(100, Math.min(1000, parseInt(zoomRange.value, 10) + delta));
                setZoomValue(newZoom);
                updateZoom(centerX, centerY);
                syncPreviews();
              }
            }

            lastTouchDistance = currentDistance;
          }

          e.preventDefault();
        },
        { passive: false },
      );

      document.addEventListener("touchend", () => {
        isDragging = false;
        lastTouchDistance = null;
      });

      cropperArea.addEventListener("wheel", (e) => {
        if (!cropperArea.classList.contains("has-image")) return;

        e.preventDefault();
        const rect = cropperArea.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        if (e.shiftKey) {
          const direction = e.deltaY > 0 ? -1 : 1;
          const nextRotation = getNextWheelRotation(parseInt(rotationRange.value, 10), direction);
          updateRotation(nextRotation);
          return;
        }

        const delta = e.deltaY > 0 ? -20 : 20;
        const newZoom = Math.max(100, Math.min(1000, parseInt(zoomRange.value, 10) + delta));
        setZoomValue(newZoom);
        updateZoom(mouseX, mouseY);
        syncPreviews();
      });

      zoomRange.addEventListener("input", () => {
        updateRangeBackground(zoomRange);
        zoomPer.textContent = `${zoomRange.value}%`;
        updateZoom(cropperArea.offsetWidth / 2, cropperArea.offsetHeight / 2);
        syncPreviews();
      });

      rotationRange.addEventListener("input", () => {
        updateRotation(parseInt(rotationRange.value, 10), { fromSlider: true });
      });

      flipHBtn.addEventListener("click", () => {
        toggleFlip("x");
      });

      flipVBtn.addEventListener("click", () => {
        toggleFlip("y");
      });

      prevRange.addEventListener("input", () => {
        cropperArea.style.borderRadius = `${prevRange.value}%`;
        prevPer.textContent = `${prevRange.value}%`;
        savedRadius = prevRange.value;
        localStorage.setItem("cropperRadius", prevRange.value);
        updateRangeBackground(prevRange);
      });

      function setCropperRadius(element, radius) {
        element.addEventListener("click", () => {
          cropperArea.style.borderRadius = `${radius}%`;
          prevPer.textContent = `${radius}%`;
          prevRange.value = radius;
          savedRadius = prevRange.value;
          localStorage.setItem("cropperRadius", radius);
          updateRangeBackground(prevRange);
        });
      }

      setCropperRadius(discordServer, 27);
      setCropperRadius(discord, 50);
      setCropperRadius(discord2, 50);
      setCropperRadius(insta, 50);

      newFileBtn.addEventListener("click", () => {
        fileInput.click();
      });

      downloadBtn.addEventListener("click", () => {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        const outputResolution = getOutputResolution();
        canvas.width = outputResolution;
        canvas.height = outputResolution;
        renderCurrentViewToCanvas(ctx, canvas.width, canvas.height);

        const link = document.createElement("a");
        const now = new Date();
        const timestamp = `${now.getFullYear().toString().slice(2)}${(now.getMonth() + 1)
          .toString()
          .padStart(2, "0")}${now.getDate().toString().padStart(2, "0")}${now
          .getHours()
          .toString()
          .padStart(2, "0")}${now.getMinutes().toString().padStart(2, "0")}${now
          .getSeconds()
          .toString()
          .padStart(2, "0")}`;

        const isPNG = currentImage.src.startsWith("data:image/png");
        const extension = isPNG ? "png" : "jpg";
        const mimeType = isPNG ? "image/png" : "image/jpeg";

        link.download = `${imageName.replace(/\.[^/.]+$/, "")}-cropped-${timestamp}.${extension}`;
        link.href = canvas.toDataURL(mimeType);
        link.click();
      });

      function handleFile(file) {
        if (!file.type.match("image.*")) {
          alert("please select image file.");
          return;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            currentImage = img;
            displayImage(img);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);

        fileName.textContent = file.name;
        imageName = file.name;
        size.textContent =
          file.size >= 1024 * 1024
            ? `${(file.size / (1024 * 1024)).toFixed(2)} MB`
            : `${(file.size / 1024).toFixed(2)} KB`;
      }

      function displayImage(img) {
        uploadPrompt.style.display = "none";
        cropperArea.classList.add("has-image");
        cropperArea.style.border = "1px dashed rgba(255, 255, 255, 0)";
        cropperArea.style.borderRadius = `${savedRadius}%`;
        previewImage.style.display = "block";
        previewImage.src = img.src;
        sideEl.style.opacity = "1";
        sideEl.style.pointerEvents = "auto";
        dimentsions.textContent = `${img.width} x ${img.height}`;

        downloadBtn.disabled = false;
        zoomRange.disabled = false;
        rotationRange.disabled = false;
        prevRange.disabled = false;

        setZoomValue(100);
        setRotationValue(0);
        imageState.flipX = 1;
        imageState.flipY = 1;
        syncFlipButtons();
        prevRange.value = savedRadius;
        prevPer.textContent = `${savedRadius}%`;
        updateRangeBackground(prevRange);

        imageState.localOffsetX = 0;
        imageState.localOffsetY = 0;
        refreshImageSize();
        applyImageState();
        syncPreviews();
      }

      let syncRequested = false;
      function syncPreviews() {
        if (syncRequested || !currentImage) return;
        syncRequested = true;

        requestAnimationFrame(() => {
          syncRequested = false;

          for (const target of previewTargets) {
            const surfaceState = getPreviewSurface(target);
            resizePreviewSurface(surfaceState, target);
            renderCurrentViewToCanvas(surfaceState.ctx, surfaceState.canvas.width, surfaceState.canvas.height);
          }
        });
      }
    </script>
  </body>
</html>
