    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter&display=swap");

      /* Theme tokens */
      :root {
        --font-sans: "Inter", "Noto Sans JP", sans-serif;
        --font-mono: Iosevka Web, "Courier New", monospace;
        --color-black: #000;
        --color-white: #fff;
        --color-panel: rgb(18, 18, 18);
        --color-online: rgb(67, 162, 90);
        --color-insta-start: #d300c5;
        --color-insta-end: #ffca00;
        --color-download-hover: #d0d6e0;
        --color-download-glow: color-mix(in srgb, #edecec, transparent 80%);
        --color-text-dim: rgba(255, 255, 255, 0.4);
        --color-text-soft: rgba(255, 255, 255, 0.6);
        --color-text-muted: rgba(255, 255, 255, 0.7);
        --color-text-option: rgba(255, 255, 255, 0.75);
        --color-white-00: rgba(255, 255, 255, 0);
        --color-white-10: rgba(255, 255, 255, 0.1);
        --color-white-15: rgba(255, 255, 255, 0.15);
        --color-white-25: rgba(255, 255, 255, 0.25);
        --color-white-50: rgba(255, 255, 255, 0.5);
        --color-white-75: rgba(255, 255, 255, 0.75);
        --color-shadow-solid: rgba(0, 0, 0, 1);
        --text-xs: 0.7rem;
        --text-sm: 0.85rem;
        --text-md: 0.9rem;
        --text-base: 1rem;
        --text-title: 1.3rem;
        --text-title-mobile: 1.2rem;
        --line-tight: 1rem;
        --line-message: 1.4rem;
        --line-link: 1.5rem;
        --line-title: 1.5;
        --space-3xs: 0.2rem;
        --space-2xs: 0.25rem;
        --space-xs: 0.3rem;
        --space-sm: 0.4rem;
        --space-md: 0.5rem;
        --space-lg: 0.6rem;
        --space-xl: 0.75rem;
        --space-2xl: 1rem;
        --space-3xl: 1.25rem;
        --space-5xl: 2rem;
        --space-6xl: 2.5rem;
        --space-7xl: 3rem;
        --space-link-brand-left: 1.9rem;
        --space-frame-label-left: 3.6rem;
        --size-main: 52rem;
        --size-full: 100%;
        --size-half: 50%;
        --size-cropper: 500px;
        --size-cropper-mobile: 300px;
        --size-social-avatar: 4.25rem;
        --size-message-avatar: 2.8rem;
        --size-insta-ring: 5rem;
        --size-control-height: 1.6rem;
        --size-button-height: 2rem;
        --size-icon-sm: 1.1rem;
        --size-icon-md: 1.25rem;
        --size-logo: 25px;
        --size-thumb-width: 1rem;
        --size-thumb-height: 1.8rem;
        --size-range-fill-min: 0.2rem;
        --size-range-marker-width: 2px;
        --size-frame: 120%;
        --size-download-firefox: 72%;
        --size-new-file-firefox: 25%;
        --size-shine-width: 30%;
        --radius-none: 0;
        --radius-xs: 0.1rem;
        --radius-sm: 0.25rem;
        --radius-full: 50%;
        --radius-pill: 9999px;
        --border-transparent: solid 1px var(--color-white-00);
        --border-soft: solid 1px var(--color-white-10);
        --border-panel: solid 1px var(--color-white-15);
        --border-muted: solid 1px var(--color-white-25);
        --border-strong: solid 1px var(--color-white-50);
        --border-crop: 1px dashed var(--color-white-25);
        --border-crop-hover: 1px dashed var(--color-white-75);
        --border-hint: 1px solid var(--color-white);
        --shadow-menu: 0 var(--space-2xs) var(--space-2xl) var(--color-shadow-solid);
        --shadow-online: 0 0 0 var(--space-sm) var(--color-black);
        --offset-frame: -10%;
        --offset-insta-ring: -0.375rem;
        --offset-shine-start: -50%;
        --offset-shine-end: 120%;
        --line-placeholder: 0.5px;
        --position-quarter: 25%;
        --position-center: 50%;
        --duration-fast: 0.2s;
        --duration-medium: 0.5s;
        --duration-shine: 2s;
        --ease-out: ease-out;
        --ease-shine: cubic-bezier(0.5, 0, 1, 1);
        --transition-background: background var(--duration-fast);
        --transition-border: border var(--duration-fast);
        --transition-color: color var(--duration-fast);
        --transition-opacity: opacity var(--duration-fast);
        --transition-transform: transform var(--duration-fast);
        --transition-box-shadow: box-shadow var(--duration-fast);
      }

      /* Reset */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* Utilities */
      .u-flex {
        display: flex;
      }
      .u-inline-center {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .u-center {
        align-items: center;
        justify-content: center;
      }
      .u-between {
        justify-content: space-between;
      }
      .u-column {
        flex-direction: column;
      }
      .u-wrap {
        flex-wrap: wrap;
      }
      .u-full {
        width: var(--size-full);
      }
      .u-fill {
        width: var(--size-full);
        height: var(--size-full);
      }
      .u-relative {
        position: relative;
      }
      .u-absolute {
        position: absolute;
      }
      .u-overflow-hidden {
        overflow: hidden;
      }
      .u-radius-sm {
        border-radius: var(--radius-sm);
      }
      .u-radius-xs {
        border-radius: var(--radius-xs);
      }
      .u-round {
        border-radius: var(--radius-full);
      }
      .u-clickable {
        cursor: pointer;
      }
      .u-no-border {
        border: none;
      }
      .u-control-bg {
        background: var(--color-white-10);
      }
      .u-text-muted {
        color: var(--color-text-muted);
      }
      .u-transition-bg {
        transition: var(--transition-background);
      }
      .u-transition-opacity {
        transition: var(--transition-opacity);
      }
      .u-icon-sm {
        width: var(--size-icon-sm);
        height: var(--size-icon-sm);
      }
      .u-plain-link {
        color: inherit;
        text-decoration: none;
      }
      .u-panel-section {
        width: var(--size-full);
      }
      .u-preview-avatar {
        position: relative;
        width: var(--size-social-avatar);
        height: var(--size-social-avatar);
        border-radius: var(--radius-full);
        cursor: pointer;
        transition: var(--transition-opacity);
      }
      .u-preview-avatar:hover {
        opacity: 0.75;
      }
      .u-icon-button {
        display: flex;
        align-items: center;
        justify-content: center;
        height: var(--size-full);
        width: var(--size-control-height);
        background: transparent;
        border: none;
        cursor: pointer;
      }

      /* Page shell */
      body {
        min-height: 100vh;
        padding: var(--space-5xl);
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--color-black);
        color: var(--color-white);
        font-family: var(--font-sans);
      }
      main {
        width: var(--size-main);
      }
      .header-row {
        gap: var(--space-xl);
        margin-bottom: var(--space-6xl);
      }
      .container {
        flex-wrap: wrap;
      }

      /* Header */
      #page-title {
        width: auto;
        gap: var(--space-xl);
        font-size: var(--text-title);
        font-weight: 400;
        line-height: var(--line-title);
      }
      #page-title:hover {
        opacity: 0.75;
      }
      #page-title img {
        height: var(--size-logo);
      }
      #links {
        gap: var(--space-md);
        color: var(--color-text-dim);
        font-size: var(--text-md);
      }
      #links a {
        padding: 0 var(--space-md);
        border: var(--border-transparent);
        background: var(--color-white-10);
        line-height: var(--line-link);
        text-align: center;
        transition: var(--transition-color), var(--transition-border);
      }
      #links a:hover,
      #links a:first-child:hover {
        border: var(--border-muted);
        color: var(--color-text-soft);
      }
      #links a:first-child {
        padding: 0 var(--space-md) 0 var(--space-link-brand-left);
        border: var(--border-soft);
        background: transparent;
        font-family: var(--font-mono);
        font-size: var(--text-base);
      }
      #links img {
        top: var(--position-center);
        left: var(--space-2xl);
        height: var(--size-icon-md);
        transform: translate(-50%, -50%);
      }
      .mobile-break {
        display: none;
      }

      /* Cropper */
      .cropper-area {
        width: var(--size-cropper);
        height: var(--size-cropper);
        border: var(--border-crop);
        border-radius: var(--radius-none);
        transition: var(--transition-border);
      }
      .cropper-area:not(.has-image):hover {
        border: var(--border-crop-hover);
      }
      .cropper-area.has-image {
        cursor: move;
      }
      #placeholder {
        width: var(--size-cropper);
        height: var(--size-cropper);
        pointer-events: none;
        background:
          linear-gradient(
            to top right,
            transparent calc(var(--position-center) - var(--line-placeholder)),
            var(--color-white-25) var(--position-center),
            transparent calc(var(--position-center) + var(--line-placeholder))
          ),
          linear-gradient(
            to bottom right,
            transparent calc(var(--position-center) - var(--line-placeholder)),
            var(--color-white-25) var(--position-center),
            transparent calc(var(--position-center) + var(--line-placeholder))
          );
        background-size: var(--size-full) var(--size-full);
        background-repeat: no-repeat;
      }
      #upload-prompt {
        text-align: center;
      }
      #preview-image {
        display: none;
        user-select: none;
        -webkit-user-drag: none;
        transition: opacity var(--duration-medium);
      }
      #crop-edge-hint {
        inset: 0;
        border: var(--border-hint);
        mix-blend-mode: difference;
        opacity: 0;
        pointer-events: none;
        z-index: 2;
      }
      #crop-edge-hint.is-visible {
        animation: crop-edge-hint-fade var(--duration-medium) var(--ease-out) forwards;
      }

      /* Sidebar */
      .side {
        flex: 1;
        width: auto;
        min-width: 0;
        margin-left: var(--space-3xl);
        padding-left: var(--space-3xl);
        border-left: var(--border-muted);
        opacity: 0.1;
        pointer-events: none;
      }
      #file-name {
        display: -webkit-box;
        margin-bottom: var(--space-xl);
        overflow: hidden;
        font-size: var(--text-base);
        text-overflow: ellipsis;
        white-space: normal;
        word-break: break-all;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }
      #description {
        color: var(--color-text-muted);
        font-size: var(--text-xs);
        line-height: var(--line-tight);
      }
      #description p {
        border-bottom: var(--border-soft);
      }

      /* Social previews */
      .social-icons {
        margin-bottom: var(--space-md);
      }
      .discord2 {
        width: var(--size-message-avatar);
        height: var(--size-message-avatar);
      }
      .discord-server {
        border-radius: var(--radius-none);
        mask: url(#blobMask);
        mask-size: var(--size-full) var(--size-full);
        mask-repeat: no-repeat;
        -webkit-mask: url(#blobMask);
        -webkit-mask-size: var(--size-full) var(--size-full);
        -webkit-mask-repeat: no-repeat;
      }
      .insta-ring {
        width: var(--size-insta-ring);
        height: var(--size-insta-ring);
        margin-top: var(--offset-insta-ring);
        padding: var(--space-3xs);
        background: conic-gradient(var(--color-insta-start), var(--color-insta-end), var(--color-insta-start));
        transform: rotate(45deg);
      }
      .insta-ring > .inner {
        background: var(--color-black);
      }
      .insta {
        transform: rotate(-45deg);
      }
      .preview-surface {
        position: absolute;
        inset: 0;
        width: var(--size-full);
        height: var(--size-full);
        display: block;
        border-radius: inherit;
        pointer-events: none;
        z-index: 0;
      }
      .online {
        right: 0;
        bottom: 0;
        width: calc(var(--size-social-avatar) / (10 / 3));
        height: calc(var(--size-social-avatar) / (10 / 3));
        background: var(--color-online);
        box-shadow: var(--shadow-online);
      }
      .frame {
        top: var(--offset-frame);
        left: var(--offset-frame);
        width: var(--size-frame);
        height: var(--size-frame);
        background: none;
        background-position: center;
        background-repeat: no-repeat;
        background-size: contain;
      }
      .online,
      .frame {
        z-index: 1;
      }
      .discord-message {
        font-size: var(--text-sm);
      }
      .message {
        padding-left: var(--space-2xl);
        line-height: var(--line-message);
      }
      .discord-name {
        font-weight: bold;
      }
      .discord-time {
        margin-left: var(--space-md);
        font-size: var(--text-xs);
        opacity: 0.5;
      }

      /* Controls */
      .controls,
      .control {
        gap: var(--space-md);
      }
      .input,
      .range-control,
      .frame-url-option {
        height: var(--size-control-height);
      }
      .input,
      .control,
      .buttons button {
        font-size: var(--text-sm);
      }
      .input {
        gap: var(--space-md);
      }
      .url-input {
        flex: 1;
        min-width: 0;
        padding: var(--space-xs) var(--space-sm);
        color: var(--color-text-muted);
      }
      .url-input:focus,
      .url-input:hover {
        background: var(--color-white-25);
      }
      .url-input::placeholder {
        color: var(--color-white-10);
      }
      .frame-url-select {
        flex: 1;
        min-width: 0;
      }
      .frame-url-label {
        top: var(--position-center);
        padding: 0 var(--space-md);
        transform: translateY(-50%);
        pointer-events: none;
        z-index: 1;
      }
      .frame-url-select .url-input {
        padding-left: var(--space-frame-label-left);
        padding-right: var(--space-link-brand-left);
      }
      .frame-url-toggle {
        top: 0;
        right: 0;
        color: var(--color-text-muted);
        border-radius: var(--radius-none) var(--radius-sm) var(--radius-sm) var(--radius-none);
        transition: var(--transition-color), var(--transition-transform), var(--transition-background);
      }
      .frame-url-toggle:hover,
      .frame-url-option:hover,
      .icon-btn:hover {
        background: var(--color-white-10);
      }
      .frame-url-toggle svg {
        transition: var(--transition-transform);
      }
      .frame-url-select.is-open .frame-url-toggle svg {
        transform: rotate(180deg);
      }
      .frame-url-menu {
        top: calc(100% + var(--space-2xs));
        right: 0;
        left: 0;
        z-index: 5;
        display: none;
        padding: var(--space-3xs);
        border: var(--border-panel);
        background: var(--color-panel);
        box-shadow: var(--shadow-menu);
      }
      .frame-url-select.is-open .frame-url-menu,
      .frame-url-option {
        display: block;
      }
      .frame-url-option {
        padding: 0 var(--space-sm);
        background: transparent;
        color: var(--color-text-option);
        font: inherit;
        text-align: left;
      }
      .flip-buttons {
        height: var(--size-full);
      }
      .icon-btn {
        color: var(--color-white);
        outline: none;
      }
      .icon-btn.is-active {
        background: var(--color-white-25);
      }
      .control {
        -webkit-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }
      .range-control {
        --range-progress: 0%;
      }
      .range-control:has(input:disabled) {
        opacity: 0.55;
      }
      .range-fill {
        inset: 0 auto 0 0;
        width: var(--range-progress);
        min-width: var(--size-range-fill-min);
        background: var(--color-white-15);
      }
      .range-fill::after {
        content: "";
        position: absolute;
        top: var(--position-quarter);
        right: var(--space-sm);
        width: var(--size-range-marker-width);
        height: var(--size-half);
        border-radius: var(--radius-pill);
        background: var(--color-white-10);
        transition: var(--transition-background);
      }
      .range-control:hover .range-fill {
        background: var(--color-white-25);
      }
      .range-control:hover .range-fill::after {
        background: var(--color-white-50);
      }
      .range-text {
        inset: 0;
        gap: var(--space-md);
        padding: 0 var(--space-md);
        pointer-events: none;
      }
      .range-value {
        opacity: 0.5;
      }
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        inset: 0;
        background: transparent;
        outline: none;
        opacity: 0;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: var(--size-thumb-width);
        height: var(--size-thumb-height);
      }
      input[type="range"]::-moz-range-thumb {
        width: var(--size-thumb-width);
        height: var(--size-thumb-height);
        border: none;
        background: transparent;
      }

      /* Actions */
      .buttons {
        gap: var(--space-md);
        height: var(--size-button-height);
      }
      .buttons button {
        position: relative;
        height: var(--size-full);
        padding: 0 var(--space-lg);
        overflow: hidden;
        justify-content: flex-start;
        color: inherit;
        font-family: var(--font-sans);
        text-align: left;
      }
      #download-btn {
        flex: 1;
        background: var(--color-white);
        color: var(--color-black);
        transition: var(--transition-background), var(--transition-box-shadow);
      }
      #download-btn:hover {
        background: var(--color-download-hover);
        box-shadow: 0 0 var(--space-5xl) var(--color-download-glow);
      }
      #download-btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: var(--offset-shine-start);
        z-index: 1;
        display: none;
        width: var(--size-shine-width);
        height: var(--size-full);
        background: var(--color-white-50);
        animation: auto ease 0s 1 normal none running none;
        pointer-events: none;
        transform: skewX(-30deg);
      }
      #download-btn:hover::before {
        display: block;
        animation: var(--duration-shine) var(--ease-shine) 0s infinite normal none running shine;
      }
      #new-file-btn {
        border: var(--border-muted);
        background: var(--color-black);
        color: var(--color-white);
        transition: var(--transition-border);
      }
      #new-file-btn:hover {
        border: var(--border-strong);
      }
      #file-input {
        display: none;
      }

      /* Animations */
      @keyframes crop-edge-hint-fade {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
        }
      }
      @keyframes shine {
        0% {
          left: var(--offset-shine-start);
        }
        50%,
        100% {
          left: var(--offset-shine-end);
        }
      }

      /* Browser fixes */
      @supports (-moz-appearance: none) {
        .range-control {
          margin-bottom: var(--space-xl);
        }
        #download-btn {
          width: var(--size-download-firefox) !important;
        }
        #new-file-btn {
          width: var(--size-new-file-firefox) !important;
        }
      }

      /* Mobile */
      @media (max-width: 900px) {
        .header-row {
          margin-bottom: var(--space-5xl);
        }
        #page-title {
          align-items: flex-start;
          flex-direction: column;
          font-size: var(--text-title-mobile);
        }
        .mobile-break {
          display: inline;
        }
        main {
          width: var(--size-full);
          max-width: var(--size-cropper-mobile);
          margin-bottom: var(--space-7xl);
        }
        .container {
          align-items: center;
          flex-direction: column;
        }

    <script>
      const cropperArea = document.getElementById("cropper");
      const previewImage = document.getElementById("preview-image");
      const cropEdgeHint = document.getElementById("crop-edge-hint");
      const uploadPrompt = document.getElementById("upload-prompt");
      const fileInput = document.getElementById("file-input");
      const fileName = document.getElementById("file-name");
      const zoomRange = document.getElementById("zoom-range");
      const rotationRange = document.getElementById("rotation-range");
      const prevRange = document.getElementById("prev-radius");
      const flipHBtn = document.getElementById("flip-h-btn");
      const flipVBtn = document.getElementById("flip-v-btn");
      const downloadBtn = document.getElementById("download-btn");
      const newFileBtn = document.getElementById("new-file-btn");
      const sideEl = document.querySelector(".side");
      const zoomPer = document.querySelector(".zoom-percent");
      const rotateDeg = document.querySelector(".rotate-degree");
      const prevPer = document.querySelector(".prev-percent");
      const dimentsions = document.getElementById("dimensions");
      const size = document.getElementById("size");
      const cDimentsions = document.getElementById("c-dimensions");
      const cPosition = document.getElementById("c-position");
      const cSize = document.getElementById("c-size");

      const discord = document.querySelector(".discord");
      const discord2 = document.querySelector(".discord2");
      const discordServer = document.querySelector(".discord-server");
      const insta = document.querySelector(".insta");
      const previewTargets = [discord, discord2, discordServer, insta];
      const previewSurfaceState = new Map();
      const PREVIEW_RENDER_SCALE = 2;
      const EVEN_ROTATION_STEP = 2;
      const ROTATION_SNAP_INTERVAL = 45;
      const ROTATION_SNAP_THRESHOLD = 5;
      const CROP_SIZE_DEBOUNCE_MS = 120;
      const EDGE_EPSILON = 0.01;

      let savedRadius = localStorage.getItem("cropperRadius") || "50";
      prevRange.value = savedRadius;
      prevPer.textContent = `${savedRadius}%`;
      zoomPer.textContent = `${zoomRange.value}%`;
      rotateDeg.textContent = `${rotationRange.value}°`;

      let imageName = "";
      let isDragging = false;
      let startX = 0;
      let startY = 0;
      let startLocalOffsetX = 0;
      let startLocalOffsetY = 0;
      let currentImage = null;
      let lastTouchDistance = null;
      let cropSizeUpdateTimeout = null;
      let lastEdgeHintSignature = "";
      let imageState = {
        zoom: 1,
        rotation: 0,
        width: 0,
        height: 0,
        localOffsetX: 0,
        localOffsetY: 0,
        flipX: 1,
        flipY: 1,
      };

      const input = document.getElementById("frameUrl");
      const frameUrlSelect = document.getElementById("frame-url-select");
      const frameUrlToggle = document.getElementById("frame-url-toggle");
      const frameUrlMenu = document.getElementById("frame-url-menu");
      const frames = document.querySelectorAll(".frame");
      const frameUrlPresets = [
        {
          name: "Angel",
          url: "https://cdn.discordapp.com/avatar-decoration-presets/a_c86b11a49bb8057ce9c974a6f7ad658a.png",
        },
        {
          name: "Dark Roses",
          url: "https://cdn.discordapp.com/media/v1/collectibles-shop/1462116613653401775/animated",
        },
        {
          name: "Spray Doodles",
          url: "https://cdn.discordapp.com/media/v1/collectibles-shop/1506049399703474186/animated",
        },
        {
          name: "Git Gud",
          url: "https://cdn.discordapp.com/media/v1/collectibles-shop/1357589632581374042/animated",
        },
        {
          name: "LittleTwinStars",
          url: "https://cdn.discordapp.com/media/v1/collectibles-shop/1488244261362340101/animated",
        },
      ];
      const savedUrl = localStorage.getItem("frameUrl") || "";
      input.value = savedUrl;

      function applyFrameUrl() {
        const url = input.value.trim().split("?")[0];
        localStorage.setItem("frameUrl", url);
        frames.forEach((frame) => {
          frame.style.backgroundImage = url ? `url("${url}")` : "none";
        });
      }

      function closeFrameUrlMenu() {
        frameUrlSelect.classList.remove("is-open");
        frameUrlToggle.setAttribute("aria-expanded", "false");
      }

      function toggleFrameUrlMenu() {
        const isOpen = frameUrlSelect.classList.toggle("is-open");
        frameUrlToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
      }

      function renderFrameUrlPresets() {
        frameUrlPresets.forEach((preset) => {
          const option = document.createElement("button");
          option.type = "button";
          option.className = "frame-url-option u-full u-no-border u-radius-xs u-clickable";
          option.textContent = preset.name;
          option.addEventListener("click", () => {
            input.value = preset.url;
            applyFrameUrl();
            closeFrameUrlMenu();
          });
          frameUrlMenu.appendChild(option);
        });
      }

      renderFrameUrlPresets();

      if (savedUrl) {
        applyFrameUrl();
      }

      input.addEventListener("input", () => {
        applyFrameUrl();
      });

      frameUrlToggle.addEventListener("click", () => {
        toggleFrameUrlMenu();
      });

      document.addEventListener("click", (e) => {
        if (!frameUrlSelect.contains(e.target)) {
          closeFrameUrlMenu();
        }
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeFrameUrlMenu();
        }
      });

      function updateRangeBackground(range) {
        const value = ((range.value - range.min) / (range.max - range.min)) * 100;
        range.parentElement.style.setProperty("--range-progress", `${value}%`);
      }

      function getCropperMetrics() {
        return {
          width: cropperArea.offsetWidth,
          height: cropperArea.offsetHeight,
          centerX: cropperArea.offsetWidth / 2,
          centerY: cropperArea.offsetHeight / 2,
          previewRadius: Math.min(cropperArea.offsetWidth, cropperArea.offsetHeight) / 2,
        };
      }

      function getBaseImageSize(img) {
        const containerRatio = cropperArea.offsetWidth / cropperArea.offsetHeight;
        const imageRatio = img.width / img.height;

        if (imageRatio > containerRatio) {
          const height = cropperArea.offsetHeight;
          return { width: height * imageRatio, height };
        }

        const width = cropperArea.offsetWidth;
        return { width, height: width / imageRatio };
      }

      function getRotationRadians() {
        return (getVisualRotation() * Math.PI) / 180;
      }

      function getVisualRotation() {
        return imageState.rotation * imageState.flipX * imageState.flipY;
      }

      function rotateVector(x, y, radians) {
        const cos = Math.cos(radians);
        const sin = Math.sin(radians);
        return {
          x: x * cos - y * sin,
          y: x * sin + y * cos,
        };
      }

      function screenVectorToLocal(dx, dy) {
        const rotated = rotateVector(dx, dy, -getRotationRadians());
        return {
          x: rotated.x * imageState.flipX,
          y: rotated.y * imageState.flipY,
        };
      }

      function refreshImageSize() {
        if (!currentImage) return;
        const base = getBaseImageSize(currentImage);
        imageState.width = base.width * imageState.zoom;
        imageState.height = base.height * imageState.zoom;
      }

      function setZoomValue(value) {
        zoomRange.value = value;
        imageState.zoom = value / 100;
        zoomPer.textContent = `${value}%`;
        updateRangeBackground(zoomRange);
      }

      function setRotationValue(value) {
        rotationRange.value = value;
        imageState.rotation = value;
        rotateDeg.textContent = `${value}°`;
        updateRangeBackground(rotationRange);
      }

      function normalizeRotation(value) {
        return Math.max(-180, Math.min(180, value));
      }

      function snapRotationForSlider(value) {
        const snappedValue = Math.round(value / ROTATION_SNAP_INTERVAL) * ROTATION_SNAP_INTERVAL;
        return Math.abs(snappedValue - value) <= ROTATION_SNAP_THRESHOLD ? snappedValue : value;
      }

      function getNextWheelRotation(currentValue, direction) {
        const normalized = normalizeRotation(currentValue);
        if (normalized % EVEN_ROTATION_STEP !== 0) {
          return normalizeRotation(normalized + direction);
        }
        return normalizeRotation(normalized + direction * EVEN_ROTATION_STEP);
      }

      function getImagePixelScale() {
        if (!currentImage || !imageState.width) return 1;
        return currentImage.width / imageState.width;
      }

      function getOutputResolution() {
        return Math.max(1, Math.round(cropperArea.offsetWidth * getImagePixelScale()));
      }

      function isDiagonalRotation() {
        const rotation = Math.abs(getVisualRotation()) % 90;
        return rotation > EDGE_EPSILON && 90 - rotation > EDGE_EPSILON;
      }

      function canShowEdgeHint() {
        return prevRange.value !== prevRange.max;
      }

      function getEdgeHintSignature() {
        return [
          imageState.width,
          imageState.height,
          imageState.localOffsetX,
          imageState.localOffsetY,
          imageState.rotation,
          imageState.flipX,
          imageState.flipY,
        ]
          .map((value) => Math.round(value * 100) / 100)
          .join(",");
      }

      function showEdgeHint(signature) {
        if (signature === lastEdgeHintSignature) return;
        lastEdgeHintSignature = signature;

        cropEdgeHint.classList.remove("is-visible");
        cropEdgeHint.offsetWidth;
        cropEdgeHint.classList.add("is-visible");
      }

      function hideEdgeHint() {
        lastEdgeHintSignature = "";
        cropEdgeHint.classList.remove("is-visible");
      }

      function clampImageState() {
        const { previewRadius } = getCropperMetrics();
        const maxOffsetX = Math.max(0, imageState.width / 2 - previewRadius);
        const maxOffsetY = Math.max(0, imageState.height / 2 - previewRadius);
        const nextOffsetX = Math.max(-maxOffsetX, Math.min(maxOffsetX, imageState.localOffsetX));
        const nextOffsetY = Math.max(-maxOffsetY, Math.min(maxOffsetY, imageState.localOffsetY));

        imageState.localOffsetX = nextOffsetX;
        imageState.localOffsetY = nextOffsetY;

        return (
          Math.abs(Math.abs(nextOffsetX) - maxOffsetX) <= EDGE_EPSILON ||
          Math.abs(Math.abs(nextOffsetY) - maxOffsetY) <= EDGE_EPSILON
        );
      }

      function renderPreviewImage() {
        const { centerX, centerY } = getCropperMetrics();
        const flippedOffset = {
          x: imageState.localOffsetX * imageState.flipX,
          y: imageState.localOffsetY * imageState.flipY,
        };
        const rotatedOffset = rotateVector(flippedOffset.x, flippedOffset.y, getRotationRadians());
        const imageCenterX = centerX - rotatedOffset.x;
        const imageCenterY = centerY - rotatedOffset.y;

        previewImage.style.width = `${imageState.width}px`;
        previewImage.style.height = `${imageState.height}px`;
        previewImage.style.left = `${imageCenterX}px`;
        previewImage.style.top = `${imageCenterY}px`;
        previewImage.style.transform = `translate(-50%, -50%) rotate(${getVisualRotation()}deg) scale(${imageState.flipX}, ${imageState.flipY})`;
        previewImage.style.transformOrigin = "center center";
      }

      function renderCurrentViewToCanvas(ctx, width, height) {
        if (!currentImage) return;

        const scale = width / cropperArea.offsetWidth;
        ctx.clearRect(0, 0, width, height);
        ctx.save();
        ctx.translate(width / 2, height / 2);
        ctx.scale(scale, scale);
        ctx.rotate(getRotationRadians());
        ctx.scale(imageState.flipX, imageState.flipY);
        ctx.drawImage(
          currentImage,
          -imageState.localOffsetX - imageState.width / 2,
          -imageState.localOffsetY - imageState.height / 2,
          imageState.width,
          imageState.height,
        );
        ctx.restore();
      }

      function getCropPositionInSource() {
        if (!currentImage) return null;

        const scale = getImagePixelScale();
        return {
          x: Math.max(0, Math.min(currentImage.width, currentImage.width / 2 + imageState.localOffsetX * scale)),
          y: Math.max(0, Math.min(currentImage.height, currentImage.height / 2 + imageState.localOffsetY * scale)),
        };
      }

      function updateCropInfo() {
        if (!currentImage) return;

        const outputResolution = getOutputResolution();
        cDimentsions.textContent = `${outputResolution} x ${outputResolution}`;

        const position = getCropPositionInSource();
        if (position) {
          cPosition.textContent = `${Math.round(position.x)}, ${Math.round(position.y)}`;
        }

        scheduleCropSizeUpdate(outputResolution);
      }

      function scheduleCropSizeUpdate(outputResolution) {
        if (cropSizeUpdateTimeout !== null) {
          clearTimeout(cropSizeUpdateTimeout);
        }

        cropSizeUpdateTimeout = setTimeout(() => {
          cropSizeUpdateTimeout = null;

          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");
          canvas.width = outputResolution;
          canvas.height = outputResolution;
          renderCurrentViewToCanvas(ctx, canvas.width, canvas.height);

          canvas.toBlob(
            (blob) => {
              if (!blob) {
                cSize.textContent = "N/A";
                return;
              }
              requestAnimationFrame(() => {
                cSize.textContent =
                  blob.size >= 1024 * 1024
                    ? `${(blob.size / (1024 * 1024)).toFixed(2)} MB`
                    : `${(blob.size / 1024).toFixed(2)} KB`;
              });
            },
            currentImage.src.startsWith("data:image/png") ? "image/png" : "image/jpeg",
          );
        }, CROP_SIZE_DEBOUNCE_MS);
      }

      function applyImageState() {
        const isAtEdge = clampImageState();
        if (canShowEdgeHint() && isDiagonalRotation() && isAtEdge) {
          showEdgeHint(getEdgeHintSignature());
        } else if (!canShowEdgeHint()) {
          hideEdgeHint();
        } else {
          lastEdgeHintSignature = "";
        }
        renderPreviewImage();
        updateCropInfo();
      }

      function updateZoom(anchorX, anchorY) {
        if (!currentImage) return;

        const metrics = getCropperMetrics();
        const focusX = anchorX ?? metrics.centerX;
        const focusY = anchorY ?? metrics.centerY;
        const localPointer = screenVectorToLocal(focusX - metrics.centerX, focusY - metrics.centerY);

        const prevWidth = imageState.width;
        const prevHeight = imageState.height;
        const normalizedX = prevWidth ? (imageState.localOffsetX + localPointer.x) / prevWidth : 0;
        const normalizedY = prevHeight ? (imageState.localOffsetY + localPointer.y) / prevHeight : 0;

        imageState.zoom = parseInt(zoomRange.value, 10) / 100;
        refreshImageSize();

        imageState.localOffsetX = normalizedX * imageState.width - localPointer.x;
        imageState.localOffsetY = normalizedY * imageState.height - localPointer.y;

        applyImageState();
      }

      function updateRotation(value, options = {}) {
        if (!currentImage) return;
        const nextValue = options.fromSlider ? snapRotationForSlider(value) : value;
        setRotationValue(normalizeRotation(nextValue));
        applyImageState();
        syncPreviews();
      }

      function updateFlipButtonState(button, isActive) {
        button.classList.toggle("is-active", isActive);
        button.setAttribute("aria-pressed", isActive ? "true" : "false");
      }

      function syncFlipButtons() {
        updateFlipButtonState(flipHBtn, imageState.flipX === -1);
        updateFlipButtonState(flipVBtn, imageState.flipY === -1);
      }

      function toggleFlip(axis) {
        if (axis === "x") {
          imageState.flipX *= -1;
        } else {
          imageState.flipY *= -1;
        }

        syncFlipButtons();
        if (!currentImage) return;
        applyImageState();
        syncPreviews();
      }

      function beginDrag(clientX, clientY) {
        isDragging = true;
        startX = clientX;
        startY = clientY;
        startLocalOffsetX = imageState.localOffsetX;
        startLocalOffsetY = imageState.localOffsetY;
      }

      function continueDrag(clientX, clientY) {
        if (!isDragging) return;
        const deltaX = clientX - startX;
        const deltaY = clientY - startY;
        const localDelta = screenVectorToLocal(deltaX, deltaY);

        imageState.localOffsetX = startLocalOffsetX - localDelta.x;
        imageState.localOffsetY = startLocalOffsetY - localDelta.y;
        applyImageState();
        syncPreviews();
      }

      function getPreviewSurface(target) {
        let surfaceState = previewSurfaceState.get(target);
        if (surfaceState) {
          return surfaceState;
        }

        const canvas = document.createElement("canvas");
        canvas.className = "preview-surface";
        target.prepend(canvas);
        surfaceState = {
          canvas,
          ctx: canvas.getContext("2d"),
          width: 0,
          height: 0,
        };
        previewSurfaceState.set(target, surfaceState);
        return surfaceState;
      }

      function resizePreviewSurface(surfaceState, target) {
        const renderScale = window.devicePixelRatio * PREVIEW_RENDER_SCALE;
        const targetWidth = Math.max(1, Math.round(target.clientWidth * renderScale));
        const targetHeight = Math.max(1, Math.round(target.clientHeight * renderScale));

        if (surfaceState.width === targetWidth && surfaceState.height === targetHeight) {
          return;
        }

        surfaceState.width = targetWidth;
        surfaceState.height = targetHeight;
        surfaceState.canvas.width = targetWidth;
        surfaceState.canvas.height = targetHeight;
      }

      updateRangeBackground(zoomRange);
      updateRangeBackground(rotationRange);
      updateRangeBackground(prevRange);
      syncFlipButtons();

      cropperArea.addEventListener("dragover", (e) => {
        e.preventDefault();
        e.stopPropagation();
        cropperArea.style.border = "1px dashed rgba(255, 255, 255, 1)";
        previewImage.style.opacity = "0.5";
      });

      cropperArea.addEventListener("dragleave", (e) => {
        e.preventDefault();
        e.stopPropagation();
        cropperArea.style.border = cropperArea.classList.contains("has-image")
          ? "1px dashed rgba(255, 255, 255, 0)"
          : "1px dashed rgba(255, 255, 255, 0.25)";
        previewImage.style.opacity = "";
      });

      cropperArea.addEventListener("drop", (e) => {
        e.preventDefault();
        e.stopPropagation();
        cropperArea.style.border = cropperArea.classList.contains("has-image")
          ? "1px dashed rgba(255, 255, 255, 0)"
          : "1px dashed rgba(255, 255, 255, 0.25)";
        previewImage.style.opacity = "";

        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
          handleFile(e.dataTransfer.files[0]);
        }
      });

      cropperArea.addEventListener("click", () => {
        if (!cropperArea.classList.contains("has-image")) {
          fileInput.click();
        }
      });

      fileInput.addEventListener("change", () => {
        if (fileInput.files && fileInput.files[0]) {
          handleFile(fileInput.files[0]);
        }
      });

      cropperArea.addEventListener("mousedown", (e) => {
        if (!cropperArea.classList.contains("has-image")) return;
        beginDrag(e.clientX, e.clientY);
        e.preventDefault();
      });

      document.addEventListener("mousemove", (e) => {
        continueDrag(e.clientX, e.clientY);
      });

      document.addEventListener("mouseup", () => {
        isDragging = false;
      });

      cropperArea.addEventListener(
        "touchstart",
        (e) => {
          if (!cropperArea.contains(e.target) || !cropperArea.classList.contains("has-image")) return;

          if (e.touches.length === 1) {
            beginDrag(e.touches[0].clientX, e.touches[0].clientY);
          } else if (e.touches.length === 2) {
            lastTouchDistance = Math.hypot(
              e.touches[0].clientX - e.touches[1].clientX,
              e.touches[0].clientY - e.touches[1].clientY,
            );
          }

          e.preventDefault();
        },
        { passive: false },
      );

      document.addEventListener(
        "touchmove",
        (e) => {
          if (!cropperArea.contains(e.target) || !cropperArea.classList.contains("has-image")) return;

          if (e.touches.length === 1 && isDragging) {
            continueDrag(e.touches[0].clientX, e.touches[0].clientY);
          } else if (e.touches.length === 2) {
            const currentDistance = Math.hypot(
              e.touches[0].clientX - e.touches[1].clientX,
              e.touches[0].clientY - e.touches[1].clientY,
            );

            if (lastTouchDistance !== null) {
              const delta = currentDistance - lastTouchDistance;
              if (Math.abs(delta) > 2) {
                const rect = cropperArea.getBoundingClientRect();
                const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
                const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;
                const newZoom = Math.max(100, Math.min(1000, parseInt(zoomRange.value, 10) + delta));
                setZoomValue(newZoom);
                updateZoom(centerX, centerY);
                syncPreviews();
              }
            }

            lastTouchDistance = currentDistance;
          }

          e.preventDefault();
        },
        { passive: false },
      );

      document.addEventListener("touchend", () => {
        isDragging = false;
        lastTouchDistance = null;
      });

      cropperArea.addEventListener("wheel", (e) => {
        if (!cropperArea.classList.contains("has-image")) return;

        e.preventDefault();
        const rect = cropperArea.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        if (e.shiftKey) {
          const direction = e.deltaY > 0 ? -1 : 1;
          const nextRotation = getNextWheelRotation(parseInt(rotationRange.value, 10), direction);
          updateRotation(nextRotation);
          return;
        }

        const delta = e.deltaY > 0 ? -20 : 20;
        const newZoom = Math.max(100, Math.min(1000, parseInt(zoomRange.value, 10) + delta));
        setZoomValue(newZoom);
        updateZoom(mouseX, mouseY);
        syncPreviews();
      });

      zoomRange.addEventListener("input", () => {
        updateRangeBackground(zoomRange);
        zoomPer.textContent = `${zoomRange.value}%`;
        updateZoom(cropperArea.offsetWidth / 2, cropperArea.offsetHeight / 2);
        syncPreviews();
      });

      rotationRange.addEventListener("input", () => {
        updateRotation(parseInt(rotationRange.value, 10), { fromSlider: true });
      });

      flipHBtn.addEventListener("click", () => {
        toggleFlip("x");
      });

      flipVBtn.addEventListener("click", () => {
        toggleFlip("y");
      });

      prevRange.addEventListener("input", () => {
        cropperArea.style.borderRadius = `${prevRange.value}%`;
        prevPer.textContent = `${prevRange.value}%`;
        savedRadius = prevRange.value;
        localStorage.setItem("cropperRadius", prevRange.value);
        updateRangeBackground(prevRange);
        if (!canShowEdgeHint()) {
          hideEdgeHint();
        }
      });

      function setCropperRadius(element, radius) {
        element.addEventListener("click", () => {
          cropperArea.style.borderRadius = `${radius}%`;
          prevPer.textContent = `${radius}%`;
          prevRange.value = radius;
          savedRadius = prevRange.value;
          localStorage.setItem("cropperRadius", radius);
          updateRangeBackground(prevRange);
          if (!canShowEdgeHint()) {
            hideEdgeHint();
          }
        });
      }

      setCropperRadius(discordServer, 27);
      setCropperRadius(discord, 50);
      setCropperRadius(discord2, 50);
      setCropperRadius(insta, 50);

      newFileBtn.addEventListener("click", () => {
        fileInput.click();
      });

      downloadBtn.addEventListener("click", () => {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        const outputResolution = getOutputResolution();
        canvas.width = outputResolution;
        canvas.height = outputResolution;
        renderCurrentViewToCanvas(ctx, canvas.width, canvas.height);

        const link = document.createElement("a");
        const now = new Date();
        const timestamp = `${now.getFullYear().toString().slice(2)}${(now.getMonth() + 1)
          .toString()
          .padStart(2, "0")}${now.getDate().toString().padStart(2, "0")}${now
          .getHours()
          .toString()
          .padStart(2, "0")}${now.getMinutes().toString().padStart(2, "0")}${now
          .getSeconds()
          .toString()
          .padStart(2, "0")}`;

        const isPNG = currentImage.src.startsWith("data:image/png");
        const extension = isPNG ? "png" : "jpg";
        const mimeType = isPNG ? "image/png" : "image/jpeg";

        link.download = `${imageName.replace(/\.[^/.]+$/, "")}-cropped-${timestamp}.${extension}`;
        link.href = canvas.toDataURL(mimeType);
        link.click();
      });

      function handleFile(file) {
        if (!file.type.match("image.*")) {
          alert("please select image file.");
          return;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            currentImage = img;
            displayImage(img);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);

        fileName.textContent = file.name;
        imageName = file.name;
        size.textContent =
          file.size >= 1024 * 1024
            ? `${(file.size / (1024 * 1024)).toFixed(2)} MB`
            : `${(file.size / 1024).toFixed(2)} KB`;
      }

      function displayImage(img) {
        uploadPrompt.style.display = "none";
        cropperArea.classList.add("has-image");
        cropperArea.style.border = "1px dashed rgba(255, 255, 255, 0)";
        cropperArea.style.borderRadius = `${savedRadius}%`;
        previewImage.style.display = "block";
        previewImage.src = img.src;
        sideEl.style.opacity = "1";
        sideEl.style.pointerEvents = "auto";
        dimentsions.textContent = `${img.width} x ${img.height}`;

        downloadBtn.disabled = false;
        zoomRange.disabled = false;
        rotationRange.disabled = false;
        prevRange.disabled = false;

        setZoomValue(100);
        setRotationValue(0);
        imageState.flipX = 1;
        imageState.flipY = 1;
        syncFlipButtons();
        prevRange.value = savedRadius;
        prevPer.textContent = `${savedRadius}%`;
        updateRangeBackground(prevRange);

        imageState.localOffsetX = 0;
        imageState.localOffsetY = 0;
        refreshImageSize();
        applyImageState();
        syncPreviews();
      }

      let syncRequested = false;
      function syncPreviews() {
        if (syncRequested || !currentImage) return;
        syncRequested = true;

        requestAnimationFrame(() => {
          syncRequested = false;

          for (const target of previewTargets) {
            const surfaceState = getPreviewSurface(target);
            resizePreviewSurface(surfaceState, target);
            renderCurrentViewToCanvas(surfaceState.ctx, surfaceState.canvas.width, surfaceState.canvas.height);
          }
        });
      }
    </script>
  </body>
</html>
